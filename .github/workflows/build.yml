name: Build

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: true
        default: "com.game.packagename"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          api-level: 30
          ndk-version: 25.2.9519653
      
      - name: Configure package name
        run: |
          sed -i "s/com.game.packagename/${{ github.event.inputs.package_name }}/g" module/src/main/cpp/game.h
      
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew :module:assembleRelease --stacktrace
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zygisk-il2cppdumper
          path: out/magisk_module_release/*.zip
